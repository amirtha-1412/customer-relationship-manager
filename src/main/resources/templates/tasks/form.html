<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pageTitle} + ' - CRM System'">Task Form - CRM System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container-fluid">
            <a class="navbar-brand fw-bold" th:href="@{/dashboard}">
                <i class="bi bi-diagram-3-fill me-2"></i>CRM System
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/dashboard}">
                            <i class="bi bi-speedometer2 me-1"></i>Dashboard
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/customers}">
                            <i class="bi bi-people-fill me-1"></i>Customers
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/leads}">
                            <i class="bi bi-clipboard2-data-fill me-1"></i>Leads
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" th:href="@{/tasks}">
                            <i class="bi bi-check2-square me-1"></i>Tasks
                        </a>
                    </li>
                </ul>
                <form th:action="@{/logout}" method="post">
                    <button type="submit" class="btn btn-outline-light btn-sm">
                        <i class="bi bi-box-arrow-right me-1"></i>Logout
                    </button>
                </form>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="container mt-4">
        <div class="row justify-content-center">
            <div class="col-md-8 col-lg-7">

                <!-- Page Header -->
                <div class="mb-4">
                    <h2 class="fw-bold mb-0" th:text="${pageTitle}">Task Form</h2>
                    <p class="text-muted">Fill in the details below and click Save.</p>
                </div>

                <!-- Form Card -->
                <div class="card shadow-sm border-0 rounded-3">
                    <div class="card-body p-4">

                        <form th:object="${task}"
                              th:action="${task.id == null} ? @{/tasks} : @{/tasks/edit/{id}(id=${task.id})}"
                              method="POST">

                            <div class="row g-3">

                                <!-- Title -->
                                <div class="col-12">
                                    <label for="title" class="form-label fw-semibold">Title</label>
                                    <input type="text" id="title" th:field="*{title}"
                                           class="form-control" placeholder="Enter task title" required>
                                </div>

                                <!-- Description -->
                                <div class="col-12">
                                    <label for="description" class="form-label fw-semibold">Description</label>
                                    <textarea id="description" th:field="*{description}"
                                              class="form-control" rows="4"
                                              placeholder="Enter task description"></textarea>
                                </div>

                                <!-- Due Date -->
                                <div class="col-md-6">
                                    <label for="dueDate" class="form-label fw-semibold">Due Date</label>
                                    <input type="date" id="dueDate" th:field="*{dueDate}"
                                           class="form-control">
                                </div>

                                <!-- Status Dropdown -->
                                <div class="col-md-6">
                                    <label for="status" class="form-label fw-semibold">Status</label>
                                    <select id="status" th:field="*{status}" class="form-select">
                                        <option value="">-- Select Status --</option>
                                        <option value="PENDING">Pending</option>
                                        <option value="COMPLETED">Completed</option>
                                    </select>
                                </div>

                                <!-- Assigned To -->
                                <div class="col-12">
                                    <label for="assignedTo" class="form-label fw-semibold">Assigned To</label>
                                    <input type="text" id="assignedTo" th:field="*{assignedTo}"
                                           class="form-control" placeholder="Enter team member name">
                                </div>

                            </div>

                            <!-- Buttons -->
                            <div class="d-flex gap-2 mt-4">
                                <button type="submit" class="btn btn-primary px-4">
                                    <i class="bi bi-floppy-fill me-1"></i> Save
                                </button>
                                <a th:href="@{/tasks}" class="btn btn-outline-secondary px-4">
                                    <i class="bi bi-x-circle me-1"></i> Cancel
                                </a>
                            </div>

                        </form>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
