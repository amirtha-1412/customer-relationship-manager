<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pageTitle} + ' - CRM System'">Tasks - CRM System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container-fluid">
            <a class="navbar-brand fw-bold" th:href="@{/dashboard}">
                <i class="bi bi-diagram-3-fill me-2"></i>CRM System
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/dashboard}">
                            <i class="bi bi-speedometer2 me-1"></i>Dashboard
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/customers}">
                            <i class="bi bi-people-fill me-1"></i>Customers
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/leads}">
                            <i class="bi bi-clipboard2-data-fill me-1"></i>Leads
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" th:href="@{/tasks}">
                            <i class="bi bi-check2-square me-1"></i>Tasks
                        </a>
                    </li>
                </ul>
                <form th:action="@{/logout}" method="post">
                    <button type="submit" class="btn btn-outline-light btn-sm">
                        <i class="bi bi-box-arrow-right me-1"></i>Logout
                    </button>
                </form>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="container mt-4">

        <!-- Page Header -->
        <div class="d-flex justify-content-between align-items-center mb-4">
            <div>
                <h2 class="fw-bold mb-0" th:text="${pageTitle}">Tasks</h2>
                <p class="text-muted mb-0">Manage and track your tasks</p>
            </div>
            <a th:href="@{/tasks/new}" class="btn btn-primary">
                <i class="bi bi-plus-circle-fill me-1"></i> Add New Task
            </a>
        </div>

        <!-- Tasks Table -->
        <div class="card shadow-sm border-0 rounded-3">
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover align-middle mb-0">
                        <thead class="table-primary">
                            <tr>
                                <th>#</th>
                                <th>Title</th>
                                <th>Description</th>
                                <th>Due Date</th>
                                <th>Status</th>
                                <th>Assigned To</th>
                                <th class="text-center">Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="task : ${tasks}">
                                <td th:text="${task.id}">1</td>
                                <td th:text="${task.title}">Task Title</td>
                                <td th:text="${task.description}">Description...</td>
                                <td th:text="${task.dueDate}">2026-01-01</td>
                                <td>
                                    <span th:text="${task.status}"
                                          th:classappend="${task.status == 'COMPLETED'} ? 'badge bg-success' : 'badge bg-warning text-dark'"
                                          class="badge">PENDING</span>
                                </td>
                                <td th:text="${task.assignedTo}">User</td>
                                <td class="text-center">
                                    <a th:href="@{/tasks/edit/{id}(id=${task.id})}"
                                       class="btn btn-sm btn-outline-primary me-1">
                                        <i class="bi bi-pencil-fill"></i> Edit
                                    </a>
                                    <a th:href="@{/tasks/delete/{id}(id=${task.id})}"
                                       class="btn btn-sm btn-outline-danger"
                                       onclick="return confirm('Are you sure you want to delete this task?')">
                                        <i class="bi bi-trash-fill"></i> Delete
                                    </a>
                                </td>
                            </tr>
                            <!-- Empty State -->
                            <tr th:if="${#lists.isEmpty(tasks)}">
                                <td colspan="7" class="text-center text-muted py-4">
                                    <i class="bi bi-check2-square fs-2 d-block mb-2"></i>
                                    No tasks found. Click <strong>"Add New Task"</strong> to get started.
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
