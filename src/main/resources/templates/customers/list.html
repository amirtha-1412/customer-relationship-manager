<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pageTitle} + ' - CRM System'">Customers - CRM System</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container-fluid">
            <a class="navbar-brand fw-bold" href="/dashboard">
                <i class="bi bi-diagram-3-fill me-2"></i>CRM System
            </a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/dashboard}">Dashboard</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" th:href="@{/customers}">Customers</a>
                    </li>
                </ul>
                <form th:action="@{/logout}" method="post">
                    <button type="submit" class="btn btn-outline-light btn-sm">
                        <i class="bi bi-box-arrow-right me-1"></i>Logout
                    </button>
                </form>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="container mt-4">

        <!-- Page Header -->
        <div class="d-flex justify-content-between align-items-center mb-4">
            <div>
                <h2 class="fw-bold mb-0" th:text="${pageTitle}">Customers</h2>
                <p class="text-muted mb-0">Manage your customer records</p>
            </div>
            <a th:href="@{/customers/new}" class="btn btn-primary">
                <i class="bi bi-person-plus-fill me-1"></i> Add New Customer
            </a>
        </div>

        <!-- Success/info message (optional, for future flash messages) -->

        <!-- Customers Table -->
        <div class="card shadow-sm border-0 rounded-3">
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover align-middle mb-0">
                        <thead class="table-primary">
                            <tr>
                                <th>#</th>
                                <th>First Name</th>
                                <th>Last Name</th>
                                <th>Email</th>
                                <th>Phone</th>
                                <th>Company</th>
                                <th>Status</th>
                                <th class="text-center">Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            <!-- Loop through customers list -->
                            <tr th:each="customer : ${customers}">
                                <td th:text="${customer.id}">1</td>
                                <td th:text="${customer.firstName}">John</td>
                                <td th:text="${customer.lastName}">Doe</td>
                                <td th:text="${customer.email}">john@example.com</td>
                                <td th:text="${customer.phone}">1234567890</td>
                                <td th:text="${customer.company}">Acme Corp</td>
                                <td>
                                    <span th:text="${customer.status}"
                                          th:classappend="${customer.status == 'ACTIVE'} ? 'badge bg-success' :
                                                          (${customer.status == 'INACTIVE'} ? 'badge bg-secondary' : 'badge bg-warning text-dark')"
                                          class="badge">ACTIVE</span>
                                </td>
                                <td class="text-center">
                                    <!-- Edit Button -->
                                    <a th:href="@{/customers/edit/{id}(id=${customer.id})}"
                                       class="btn btn-sm btn-outline-primary me-1">
                                        <i class="bi bi-pencil-fill"></i> Edit
                                    </a>
                                    <!-- Delete Button -->
                                    <a th:href="@{/customers/delete/{id}(id=${customer.id})}"
                                       class="btn btn-sm btn-outline-danger"
                                       onclick="return confirm('Are you sure you want to delete this customer?')">
                                        <i class="bi bi-trash-fill"></i> Delete
                                    </a>
                                </td>
                            </tr>
                            <!-- Empty State -->
                            <tr th:if="${#lists.isEmpty(customers)}">
                                <td colspan="8" class="text-center text-muted py-4">
                                    <i class="bi bi-people fs-2 d-block mb-2"></i>
                                    No customers found. Click <strong>"Add New Customer"</strong> to get started.
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

    </div>

    <!-- Bootstrap 5 Bundle JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
