<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pageTitle} + ' - CRM System'">Customer Form - CRM System</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container-fluid">
            <a class="navbar-brand fw-bold" href="/dashboard">
                <i class="bi bi-diagram-3-fill me-2"></i>CRM System
            </a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/dashboard}">Dashboard</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" th:href="@{/customers}">Customers</a>
                    </li>
                </ul>
                <form th:action="@{/logout}" method="post">
                    <button type="submit" class="btn btn-outline-light btn-sm">
                        <i class="bi bi-box-arrow-right me-1"></i>Logout
                    </button>
                </form>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="container mt-4">
        <div class="row justify-content-center">
            <div class="col-md-8 col-lg-7">

                <!-- Page Header -->
                <div class="mb-4">
                    <h2 class="fw-bold mb-0" th:text="${pageTitle}">Customer Form</h2>
                    <p class="text-muted">Fill in the details below and click Save.</p>
                </div>

                <!-- Form Card -->
                <div class="card shadow-sm border-0 rounded-3">
                    <div class="card-body p-4">

                        <!--
                            th:action dynamically switches between:
                            - POST /customers         (for new customers, id is null)
                            - POST /customers/edit/{id} (for editing existing customers)
                        -->
                        <form th:object="${customer}"
                              th:action="${customer.id == null} ? @{/customers} : @{/customers/edit/{id}(id=${customer.id})}"
                              method="POST">

                            <div class="row g-3">

                                <!-- First Name -->
                                <div class="col-md-6">
                                    <label for="firstName" class="form-label fw-semibold">First Name</label>
                                    <input type="text" id="firstName" th:field="*{firstName}"
                                           class="form-control" placeholder="Enter first name" required>
                                </div>

                                <!-- Last Name -->
                                <div class="col-md-6">
                                    <label for="lastName" class="form-label fw-semibold">Last Name</label>
                                    <input type="text" id="lastName" th:field="*{lastName}"
                                           class="form-control" placeholder="Enter last name" required>
                                </div>

                                <!-- Email -->
                                <div class="col-md-6">
                                    <label for="email" class="form-label fw-semibold">Email</label>
                                    <input type="email" id="email" th:field="*{email}"
                                           class="form-control" placeholder="email@example.com" required>
                                </div>

                                <!-- Phone -->
                                <div class="col-md-6">
                                    <label for="phone" class="form-label fw-semibold">Phone</label>
                                    <input type="tel" id="phone" th:field="*{phone}"
                                           class="form-control" placeholder="Enter phone number">
                                </div>

                                <!-- Company -->
                                <div class="col-md-6">
                                    <label for="company" class="form-label fw-semibold">Company</label>
                                    <input type="text" id="company" th:field="*{company}"
                                           class="form-control" placeholder="Enter company name">
                                </div>

                                <!-- Status -->
                                <div class="col-md-6">
                                    <label for="status" class="form-label fw-semibold">Status</label>
                                    <select id="status" th:field="*{status}" class="form-select">
                                        <option value="">-- Select Status --</option>
                                        <option value="ACTIVE">Active</option>
                                        <option value="INACTIVE">Inactive</option>
                                        <option value="LEAD">Lead</option>
                                    </select>
                                </div>

                            </div><!-- end row -->

                            <!-- Buttons -->
                            <div class="d-flex gap-2 mt-4">
                                <button type="submit" class="btn btn-primary px-4">
                                    <i class="bi bi-floppy-fill me-1"></i> Save
                                </button>
                                <a th:href="@{/customers}" class="btn btn-outline-secondary px-4">
                                    <i class="bi bi-x-circle me-1"></i> Cancel
                                </a>
                            </div>

                        </form>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <!-- Bootstrap 5 Bundle JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
