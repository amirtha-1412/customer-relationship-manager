<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pageTitle} + ' - CRM System'">Dashboard - CRM System</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>

    <!-- Navigation -->
    <nav class="navbar">
        <div class="nav-brand">
            <h2>CRM System</h2>
        </div>
        <div class="nav-links">
            <a th:href="@{/dashboard}" class="nav-link active">Dashboard</a>
            <span sec:authentication="name" class="nav-user"></span>
            <form th:action="@{/logout}" method="post" style="display:inline;">
                <button type="submit" class="btn btn-logout">Logout</button>
            </form>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="main-content">
        <div class="page-header">
            <h1 th:text="${pageTitle}">Dashboard</h1>
            <p>Welcome to the Customer Relationship Management System</p>
        </div>

        <div class="dashboard-grid">
            <div class="card stat-card">
                <div class="stat-icon">👥</div>
                <div class="stat-info">
                    <h3>Total Customers</h3>
                    <p class="stat-value">0</p>
                </div>
            </div>
            <div class="card stat-card">
                <div class="stat-icon">📋</div>
                <div class="stat-info">
                    <h3>Active Leads</h3>
                    <p class="stat-value">0</p>
                </div>
            </div>
            <div class="card stat-card">
                <div class="stat-icon">✅</div>
                <div class="stat-info">
                    <h3>Closed Deals</h3>
                    <p class="stat-value">0</p>
                </div>
            </div>
            <div class="card stat-card">
                <div class="stat-icon">📞</div>
                <div class="stat-info">
                    <h3>Contacts</h3>
                    <p class="stat-value">0</p>
                </div>
            </div>
        </div>
    </main>

</body>

</html>
