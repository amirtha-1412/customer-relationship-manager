<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pageTitle} + ' - CRM System'">Opportunity Form - CRM System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container-fluid">
            <a class="navbar-brand fw-bold" th:href="@{/dashboard}">
                <i class="bi bi-diagram-3-fill me-2"></i>CRM System
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/dashboard}">
                            <i class="bi bi-speedometer2 me-1"></i>Dashboard
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/customers}">
                            <i class="bi bi-people-fill me-1"></i>Customers
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/leads}">
                            <i class="bi bi-clipboard2-data-fill me-1"></i>Leads
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/tasks}">
                            <i class="bi bi-check2-square me-1"></i>Tasks
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/interactions}">
                            <i class="bi bi-chat-dots-fill me-1"></i>Interactions
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" th:href="@{/opportunities}">
                            <i class="bi bi-currency-dollar me-1"></i>Opportunities
                        </a>
                    </li>
                </ul>
                <form th:action="@{/logout}" method="post">
                    <button type="submit" class="btn btn-outline-light btn-sm">
                        <i class="bi bi-box-arrow-right me-1"></i>Logout
                    </button>
                </form>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="container mt-4">
        <div class="row justify-content-center">
            <div class="col-md-8 col-lg-7">

                <!-- Page Header -->
                <div class="mb-4">
                    <h2 class="fw-bold mb-0" th:text="${pageTitle}">Opportunity Form</h2>
                    <p class="text-muted">Fill in the details below and click Save.</p>
                </div>

                <!-- Form Card -->
                <div class="card shadow-sm border-0 rounded-3">
                    <div class="card-body p-4">

                        <form th:object="${opportunity}"
                              th:action="${opportunity.id == null} ? @{/opportunities} : @{/opportunities/edit/{id}(id=${opportunity.id})}"
                              method="POST">

                            <div class="row g-3">

                                <!-- Customer ID -->
                                <div class="col-md-6">
                                    <label for="customerId" class="form-label fw-semibold">Customer ID</label>
                                    <input type="number" id="customerId" th:field="*{customerId}"
                                           class="form-control" placeholder="Enter customer ID" min="1">
                                </div>

                                <!-- Deal Name -->
                                <div class="col-md-6">
                                    <label for="dealName" class="form-label fw-semibold">Deal Name</label>
                                    <input type="text" id="dealName" th:field="*{dealName}"
                                           class="form-control" placeholder="Enter deal name" required>
                                </div>

                                <!-- Amount -->
                                <div class="col-md-6">
                                    <label for="amount" class="form-label fw-semibold">Amount (₹)</label>
                                    <div class="input-group">
                                        <span class="input-group-text">₹</span>
                                        <input type="number" id="amount" th:field="*{amount}"
                                               class="form-control" placeholder="0.00"
                                               step="0.01" min="0">
                                    </div>
                                </div>

                                <!-- Stage Dropdown -->
                                <div class="col-md-6">
                                    <label for="stage" class="form-label fw-semibold">Stage</label>
                                    <select id="stage" th:field="*{stage}" class="form-select" required>
                                        <option value="">-- Select Stage --</option>
                                        <option value="PROSPECT">Prospect</option>
                                        <option value="NEGOTIATION">Negotiation</option>
                                        <option value="WON">Won</option>
                                        <option value="LOST">Lost</option>
                                    </select>
                                </div>

                                <!-- Close Date -->
                                <div class="col-md-6">
                                    <label for="closeDate" class="form-label fw-semibold">Close Date</label>
                                    <input type="date" id="closeDate" th:field="*{closeDate}"
                                           class="form-control">
                                </div>

                            </div>

                            <!-- Buttons -->
                            <div class="d-flex gap-2 mt-4">
                                <button type="submit" class="btn btn-primary px-4">
                                    <i class="bi bi-floppy-fill me-1"></i> Save
                                </button>
                                <a th:href="@{/opportunities}" class="btn btn-outline-secondary px-4">
                                    <i class="bi bi-x-circle me-1"></i> Cancel
                                </a>
                            </div>

                        </form>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
