<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pageTitle} + ' - CRM System'">Leads - CRM System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container-fluid">
            <a class="navbar-brand fw-bold" th:href="@{/dashboard}">
                <i class="bi bi-diagram-3-fill me-2"></i>CRM System
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/dashboard}">
                            <i class="bi bi-speedometer2 me-1"></i>Dashboard
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/customers}">
                            <i class="bi bi-people-fill me-1"></i>Customers
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" th:href="@{/leads}">
                            <i class="bi bi-clipboard2-data-fill me-1"></i>Leads
                        </a>
                    </li>
                </ul>
                <form th:action="@{/logout}" method="post">
                    <button type="submit" class="btn btn-outline-light btn-sm">
                        <i class="bi bi-box-arrow-right me-1"></i>Logout
                    </button>
                </form>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="container mt-4">

        <!-- Page Header -->
        <div class="d-flex justify-content-between align-items-center mb-4">
            <div>
                <h2 class="fw-bold mb-0" th:text="${pageTitle}">Leads</h2>
                <p class="text-muted mb-0">Track and manage your sales leads</p>
            </div>
            <a th:href="@{/leads/new}" class="btn btn-primary">
                <i class="bi bi-plus-circle-fill me-1"></i> Add New Lead
            </a>
        </div>

        <!-- Leads Table -->
        <div class="card shadow-sm border-0 rounded-3">
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover align-middle mb-0">
                        <thead class="table-primary">
                            <tr>
                                <th>#</th>
                                <th>Name</th>
                                <th>Email</th>
                                <th>Phone</th>
                                <th>Source</th>
                                <th>Status</th>
                                <th>Assigned To</th>
                                <th class="text-center">Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="lead : ${leads}">
                                <td th:text="${lead.id}">1</td>
                                <td th:text="${lead.name}">John Doe</td>
                                <td th:text="${lead.email}">john@example.com</td>
                                <td th:text="${lead.phone}">1234567890</td>
                                <td th:text="${lead.source}">Website</td>
                                <td>
                                    <span th:text="${lead.status}"
                                          th:classappend="${lead.status == 'NEW'} ? 'badge bg-info text-dark' :
                                                          (${lead.status == 'CONTACTED'} ? 'badge bg-primary' :
                                                          (${lead.status == 'QUALIFIED'} ? 'badge bg-success' : 'badge bg-danger'))"
                                          class="badge">NEW</span>
                                </td>
                                <td th:text="${lead.assignedTo}">Sales User</td>
                                <td class="text-center">
                                    <a th:href="@{/leads/edit/{id}(id=${lead.id})}"
                                       class="btn btn-sm btn-outline-primary me-1">
                                        <i class="bi bi-pencil-fill"></i> Edit
                                    </a>
                                    <a th:href="@{/leads/delete/{id}(id=${lead.id})}"
                                       class="btn btn-sm btn-outline-danger"
                                       onclick="return confirm('Are you sure you want to delete this lead?')">
                                        <i class="bi bi-trash-fill"></i> Delete
                                    </a>
                                </td>
                            </tr>
                            <!-- Empty State -->
                            <tr th:if="${#lists.isEmpty(leads)}">
                                <td colspan="8" class="text-center text-muted py-4">
                                    <i class="bi bi-clipboard2-x fs-2 d-block mb-2"></i>
                                    No leads found. Click <strong>"Add New Lead"</strong> to get started.
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
