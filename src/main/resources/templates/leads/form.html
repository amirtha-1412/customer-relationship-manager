<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pageTitle} + ' - CRM System'">Lead Form - CRM System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container-fluid">
            <a class="navbar-brand fw-bold" th:href="@{/dashboard}">
                <i class="bi bi-diagram-3-fill me-2"></i>CRM System
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/dashboard}">
                            <i class="bi bi-speedometer2 me-1"></i>Dashboard
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/customers}">
                            <i class="bi bi-people-fill me-1"></i>Customers
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" th:href="@{/leads}">
                            <i class="bi bi-clipboard2-data-fill me-1"></i>Leads
                        </a>
                    </li>
                </ul>
                <form th:action="@{/logout}" method="post">
                    <button type="submit" class="btn btn-outline-light btn-sm">
                        <i class="bi bi-box-arrow-right me-1"></i>Logout
                    </button>
                </form>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="container mt-4">
        <div class="row justify-content-center">
            <div class="col-md-8 col-lg-7">

                <!-- Page Header -->
                <div class="mb-4">
                    <h2 class="fw-bold mb-0" th:text="${pageTitle}">Lead Form</h2>
                    <p class="text-muted">Fill in the details below and click Save.</p>
                </div>

                <!-- Form Card -->
                <div class="card shadow-sm border-0 rounded-3">
                    <div class="card-body p-4">

                        <form th:object="${lead}"
                              th:action="${lead.id == null} ? @{/leads} : @{/leads/edit/{id}(id=${lead.id})}"
                              method="POST">

                            <div class="row g-3">

                                <!-- Name -->
                                <div class="col-12">
                                    <label for="name" class="form-label fw-semibold">Name</label>
                                    <input type="text" id="name" th:field="*{name}"
                                           class="form-control" placeholder="Enter lead name" required>
                                </div>

                                <!-- Email -->
                                <div class="col-md-6">
                                    <label for="email" class="form-label fw-semibold">Email</label>
                                    <input type="email" id="email" th:field="*{email}"
                                           class="form-control" placeholder="email@example.com">
                                </div>

                                <!-- Phone -->
                                <div class="col-md-6">
                                    <label for="phone" class="form-label fw-semibold">Phone</label>
                                    <input type="tel" id="phone" th:field="*{phone}"
                                           class="form-control" placeholder="Enter phone number">
                                </div>

                                <!-- Source Dropdown -->
                                <div class="col-md-6">
                                    <label for="source" class="form-label fw-semibold">Source</label>
                                    <select id="source" th:field="*{source}" class="form-select">
                                        <option value="">-- Select Source --</option>
                                        <option value="Website">Website</option>
                                        <option value="Referral">Referral</option>
                                        <option value="Ads">Ads</option>
                                        <option value="Social Media">Social Media</option>
                                        <option value="Email Campaign">Email Campaign</option>
                                        <option value="Other">Other</option>
                                    </select>
                                </div>

                                <!-- Status Dropdown -->
                                <div class="col-md-6">
                                    <label for="status" class="form-label fw-semibold">Status</label>
                                    <select id="status" th:field="*{status}" class="form-select">
                                        <option value="">-- Select Status --</option>
                                        <option value="NEW">New</option>
                                        <option value="CONTACTED">Contacted</option>
                                        <option value="QUALIFIED">Qualified</option>
                                        <option value="LOST">Lost</option>
                                    </select>
                                </div>

                                <!-- Assigned To -->
                                <div class="col-12">
                                    <label for="assignedTo" class="form-label fw-semibold">Assigned To</label>
                                    <input type="text" id="assignedTo" th:field="*{assignedTo}"
                                           class="form-control" placeholder="Enter sales user name">
                                </div>

                            </div>

                            <!-- Buttons -->
                            <div class="d-flex gap-2 mt-4">
                                <button type="submit" class="btn btn-primary px-4">
                                    <i class="bi bi-floppy-fill me-1"></i> Save
                                </button>
                                <a th:href="@{/leads}" class="btn btn-outline-secondary px-4">
                                    <i class="bi bi-x-circle me-1"></i> Cancel
                                </a>
                            </div>

                        </form>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
