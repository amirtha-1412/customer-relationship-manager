# ==========================================
# Application Configuration
# ==========================================
spring.application.name=customer-relationship-manager
server.port=8080

# ==========================================
# Database Configuration (MySQL)
# ==========================================
spring.datasource.url=jdbc:mysql://localhost:3306/crm_db\
  ?useSSL=false\
  &serverTimezone=UTC\
  &allowPublicKeyRetrieval=true\
  &useUnicode=true\
  &characterEncoding=UTF-8\
  &autoReconnect=true\
  &failOverReadOnly=false\
  &maxReconnects=10
spring.datasource.username=root
spring.datasource.password=Amirtha@1412
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ==========================================
# HikariCP Connection Pool Configuration
# ==========================================
spring.datasource.hikari.pool-name=CrmHikariPool
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.max-lifetime=1200000
spring.datasource.hikari.auto-commit=true
spring.datasource.hikari.connection-test-query=SELECT 1

# ==========================================
# JPA / Hibernate Configuration
# ==========================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.use_sql_comments=true
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.open-in-view=false

# ==========================================
# Thymeleaf Configuration
# ==========================================
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.encoding=UTF-8

# ==========================================
# Logging Configuration
# ==========================================
logging.level.com.crm=DEBUG
logging.level.org.springframework.security=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.com.zaxxer.hikari=INFO

# ==========================================
# Mail / SMTP Configuration (Gmail)
# ==========================================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
